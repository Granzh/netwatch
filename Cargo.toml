[package]
name = "netwatch"
version = "0.1.0"
edition = "2024"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
chrono = { version = "0.4", features = ["serde"] }
notify = "8.2.0"
thiserror = "2.0.18"
toml = "1.1.2"

[profile.release]
strip = true
opt-level = "z"
lto = true
codegen-units = 1
