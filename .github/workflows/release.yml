name: Publish Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-deb
        run: cargo install cargo-deb

      - name: Install musl toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools
          rustup target add x86_64-unknown-linux-musl

      - name: Build binary
        run: cargo build --release --target x86_64-unknown-linux-musl

      - name: Create DEB
        run: cargo deb --no-build --target x86_64-unknown-linux-musl

      - name: Create tar.gz
        run: |
          SAFE_TAG=$(echo "${GITHUB_REF_NAME}" | sed 's/\//-/g')
          ARCHIVE="netwatch-${SAFE_TAG}-x86_64-unknown-linux-musl.tar.gz"

          mkdir -p dist/netwatch
          cp target/x86_64-unknown-linux-musl/release/netwatch dist/netwatch/
          cp deploy/install.sh deploy/uninstall.sh deploy/netwatch.service dist/netwatch/ || true

          tar -czf "${ARCHIVE}" -C dist/netwatch .

          echo "ARCHIVE=${ARCHIVE}" >> "$GITHUB_ENV"

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/x86_64-unknown-linux-musl/debian/*.deb
            ${{ env.ARCHIVE }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
